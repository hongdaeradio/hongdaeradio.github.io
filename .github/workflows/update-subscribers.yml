name: Update Subscriber Count

on:
  schedule:
    # 매일 KST 08:30 (UTC 23:30 전날)
    - cron: '30 23 * * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Run landing page update script
        env:
          YT_API_KEY: AIzaSyB7cKO1_y88hed-u0Xkfak6Vno9RxEkAew
          YT_CHANNEL_ID: UCUgpNaLu2IC4VtgJh5BAlaQ
        run: python3 .github/scripts/update-landing.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes" && exit 0
          git add index.html
          git commit -m "chore: auto-update landing (subscribers + views + latest videos)"
          git push
